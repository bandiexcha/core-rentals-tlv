name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: team_p0t8mS3RaJgm73KmKlClL0V4
  VERCEL_PROJECT_ID: prj_wFhRYQ9IXbaV2cSf9lVMAknCGBoc

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel@54.9.1

      - name: Deploy to Vercel
        run: vercel deploy --prod --yes --archive=tgz --token=${{ secrets.VERCEL_TOKEN }}
